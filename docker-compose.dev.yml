version: "3.9"

services:
  db:
    build: ./db
    environment:
      POSTGRES_DB: dating
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./dating_backend/django
    command: >
      sh -c "sleep 5 &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - ./dating_backend/django:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./dating_frontend/webnext
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./dating_frontend/webnext:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: