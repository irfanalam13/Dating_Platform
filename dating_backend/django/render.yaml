services:
  - type: web
    name: dating_backend
    env: python

    buildCommand: "./build.sh"

    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: SECRET_KEY
        sync: false

      - key: DEBUG
        value: false

      - key: ALLOWED_HOSTS
        value: ".onrender.com"

      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"

      - key: WEB_CONCURRENCY
        value: 4
