
services:
  db:
    build: ./db
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: dating_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./dating_backend/django
    container_name: django_backend
    command: >
      sh -c "
      sleep 5 &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - ./dating_backend/django:/app
    depends_on:
      - db
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./dating_frontend/webnext
    container_name: next_frontend
    command: npm start   # ✅ production mode
    ports:
      - "3000:3000"
    depends_on:
      - backend
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  node_modules:
